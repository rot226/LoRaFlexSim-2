name: loraflexsim smoke test

on:
  push:
  pull_request:

jobs:
  validate-language:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Language surface check (report-only during migration)
        run: make validate-language

      - name: Documentation consistency check
        run: make validate-docs-consistency

      - name: Public entrypoint regression tests
        run: make static-public-entrypoints

  smoke-linux:
    needs: validate-language
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: CLI smoke
        run: |
          loraflexsim --help
          loraflexsim run --help
          python -m loraflexsim.run --help

  smoke-windows:
    needs: validate-language
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        shell: pwsh
        run: python -m venv .venv

      - name: Install package in venv
        shell: pwsh
        run: .\.venv\Scripts\python -m pip install -e .

      - name: Check Windows launcher exists
        shell: pwsh
        run: |
          if (-not (Test-Path .\.venv\Scripts\loraflexsim.exe)) {
            Write-Error "Launcher manquant: .venv\\Scripts\\loraflexsim.exe"
          }

      - name: CLI smoke
        shell: pwsh
        run: |
          .\.venv\Scripts\loraflexsim.exe --help
          .\.venv\Scripts\loraflexsim.exe run --help
          .\.venv\Scripts\python -m loraflexsim.run --help
