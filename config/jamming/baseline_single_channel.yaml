# Scénario baseline mono-canal pour les campagnes de brouillage.
scenario: baseline_single_channel
band: EU868
channels_mhz: [868.1]
legitimate_channels_mhz: [868.1]
jammed_channel_mhz: 868.1
sim_time_s: 3600
node_counts: [20, 50, 100]
seeds: "0:49"
gateway_position:
  x_m: 0.0
  y_m: 0.0
node_distribution:
  type: uniform
  area:
    width_m: 1000.0
    height_m: 1000.0
initial_sf_range: [7, 12]
node_tx_power_dbm: 14
jammer_tx_power_dbm: 14
bandwidth_khz: 125
send_interval_s: [150, 200]
jammer_duty_cycle: 0.01
channel_selection: static
adr: off
time_bin_size: 60
