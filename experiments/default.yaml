# Scénario par défaut mobile-sfrd_th
name: default

# Recommandation pour résultats robustes (papier principal):
# - Grille N dense pour mieux capturer la non-linéarité de charge.
# - Au moins 8 à 10 répétitions selon le budget calcul.
recommended_grid:
  N: [40, 60, 80, 100, 120, 140, 160, 180, 200]
  reps_min: 8
  reps_target: 10

# Presets CLI recommandés (équivalents aux profils --profile).
presets:
  smoke:
    description: "Rapide: vérification pipeline et non régression basique"
    grid: "N=40,100,200;speed=1;mode=SNIR_OFF,SNIR_ON;algo=ADR,UCB;reps=1;duration_s=300;seed_base=1234"
  paper_core:
    description: "Robuste: noyau principal pour les figures papier"
    grid: "N=40,60,80,100,120,140,160,180,200;speed=1,3;mode=SNIR_OFF,SNIR_ON;algo=ADR,ADR_MIXRA,UCB,UCB_FORGET;reps=8;duration_s=3600;seed_base=1234"
  paper_extended:
    description: "Annexe: couverture élargie pour analyses complémentaires"
    grid: "N=40,60,80,100,120,140,160,180,200;speed=0,1,3,5;mode=SNIR_OFF,SNIR_ON;algo=ADR,ADR_MIXRA,UCB,UCB_FORGET;reps=10;duration_s=5400;seed_base=1234"
